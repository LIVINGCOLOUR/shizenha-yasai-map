<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>今朝の収穫の様子 | 自然派やさいマップ</title>
  <meta name="description" content="ガシャッパ通信から、今朝の畑の動画へ。動画のあと、農園プロフィールへ進みます。" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="harvest-video-page">
  <main class="harvest-stage">
    <div class="harvest-stage-inner">
      <header class="harvest-stage-head">
        <h1 class="harvest-stage-title">今朝の収穫の様子</h1>
        <p class="harvest-stage-date" data-harvest-date>2025年6月16日</p>
      </header>

      <div class="harvest-stage-video" data-video-shell>
        <video
          class="harvest-stage-player"
          data-harvest-video
          controls
          playsinline
          preload="metadata"
        ></video>
        <div class="harvest-stage-placeholder" data-video-placeholder hidden>
          <span>動画を準備中です</span>
          <p>収穫動画を配置すると、この画面で再生できます。</p>
        </div>
      </div>

      <p class="harvest-stage-message" data-harvest-message>野菜と一緒に届いた、八郷の畑の時間です。</p>

      <div class="harvest-stage-actions">
        <button type="button" class="harvest-stage-fullscreen" data-harvest-fullscreen>全画面で見る</button>
        <a class="harvest-stage-button" data-harvest-profile-link href="farmer.html?id=yamada-nouen">今すぐ農園プロフィールを見る</a>
      </div>
    </div>
  </main>
  <script src="js/main.js"></script>
</body>
</html>
